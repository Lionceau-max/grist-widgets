<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organigramme DINUM</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Marianne:wght@400;500;700;800&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Source Sans 3', 'Marianne', system-ui, sans-serif;
    background: #f5f5fe;
    color: #1e1e1e;
    overflow: auto;
  }

  .header {
    background: linear-gradient(135deg, #000091 0%, #1b1b8d 100%);
    color: #fff;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .header .subtitle { font-size: 13px; opacity: 0.7; margin-top: 2px; }

  .controls {
    padding: 12px 28px;
    background: #fff;
    border-bottom: 1px solid #ddd;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .controls input {
    padding: 6px 12px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 13px;
    width: 240px;
    font-family: inherit;
  }
  .controls input:focus { outline: none; border-color: #000091; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }

  .tree-container {
    padding: 24px;
    overflow: auto;
  }

  /* Tree layout */
  .org-tree { display: flex; flex-direction: column; align-items: center; }
  .org-tree ul {
    display: flex;
    justify-content: center;
    gap: 0;
    list-style: none;
    padding-top: 24px;
    position: relative;
  }
  .org-tree ul::before {
    content: '';
    position: absolute;
    top: 0;
    left: calc(50% - 0.5px);
    width: 0;
    height: 0;
  }
  .org-tree li {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    padding: 24px 6px 0;
  }

  /* Connectors */
  .org-tree li::before, .org-tree li::after {
    content: '';
    position: absolute;
    top: 0;
    width: 50%;
    height: 24px;
    border-top: 2px solid #b3b3de;
  }
  .org-tree li::before { left: 50%; border-left: 2px solid #b3b3de; }
  .org-tree li::after { right: 50%; }
  .org-tree li:first-child::after { display: none; }
  .org-tree li:last-child::before { border-right: none; display: none; }
  .org-tree li:last-child::after { border-right: 2px solid #b3b3de; border-left: none; }
  .org-tree li:only-child::before, .org-tree li:only-child::after {
    display: none;
  }
  .org-tree li:only-child { padding-top: 24px; }
  .org-tree li:only-child::before {
    display: block;
    width: 0;
    left: 50%;
    border-left: 2px solid #b3b3de;
    border-top: none;
  }

  .org-tree > ul > li::before, .org-tree > ul > li::after { display: none; }
  .org-tree > ul > li { padding-top: 0; }

  /* Parent connector down */
  .org-tree ul.has-children::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    width: 0;
    height: 24px;
    border-left: 2px solid #b3b3de;
  }

  /* Card */
  .card {
    background: #fff;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    padding: 10px 14px;
    min-width: 160px;
    max-width: 210px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .card:hover { border-color: #000091; box-shadow: 0 4px 16px rgba(0,0,145,0.12); transform: translateY(-2px); }
  .card.direction { background: #000091; color: #fff; border-color: #000091; min-width: 220px; }
  .card.direction .card-name { color: #fff; }
  .card.direction .card-title { color: rgba(255,255,255,0.8); }
  .card.cabinet { border-color: #ce0500; border-width: 2px; }
  .card.departement { background: #000091; color: #fff; border-color: #000091; }
  .card.departement .card-name { color: #fff; }
  .card.departement .card-title { color: rgba(255,255,255,0.8); }
  .card.pole { background: #f0f0ff; border-color: #6a6af4; }
  .card.interim::after {
    content: 'intérim';
    position: absolute;
    top: -8px;
    right: -6px;
    background: #ff6f00;
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 8px;
    text-transform: uppercase;
  }
  .card.highlight { box-shadow: 0 0 0 3px #ff0; }

  .card-unite { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
  .card-name { font-size: 13px; font-weight: 600; color: #000091; }
  .card-title { font-size: 10px; color: #666; margin-top: 2px; }

  /* Detail panel */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:200; }
  .overlay.open { display:block; }
  .detail-panel {
    position: fixed;
    right: -400px;
    top: 0;
    bottom: 0;
    width: 380px;
    background: #fff;
    z-index: 201;
    box-shadow: -4px 0 24px rgba(0,0,0,0.15);
    transition: right 0.25s ease;
    overflow-y: auto;
    padding: 24px;
  }
  .detail-panel.open { right: 0; }
  .detail-panel .close-btn {
    position: absolute; top:12px; right:12px;
    background: none; border:none; font-size:22px; cursor:pointer; color:#666;
  }
  .detail-panel h2 { font-size:18px; color:#000091; margin-bottom:4px; }
  .detail-panel .dp-unite { font-size:13px; color:#666; margin-bottom:12px; }
  .detail-panel .dp-field { margin-bottom:10px; }
  .detail-panel .dp-label { font-size:11px; font-weight:700; color:#999; text-transform:uppercase; letter-spacing:0.5px; }
  .detail-panel .dp-value { font-size:14px; margin-top:2px; }

  /* Responsive: horizontal scroll for wide trees */
  .tree-scroll { overflow-x: auto; min-width: 100%; display: inline-block; }

  .legend {
    display: flex; gap:16px; padding: 0 28px 16px; flex-wrap: wrap;
  }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:12px; }
  .legend-swatch { width:14px; height:14px; border-radius:3px; border:1px solid #ccc; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Organigramme DINUM</h1>
    <div class="subtitle">Direction interministérielle du numérique</div>
  </div>
</div>

<div class="controls">
  <input type="text" id="search" placeholder="Rechercher un nom, unité…" />
  <div class="legend">
    <span class="legend-item"><span class="legend-swatch" style="background:#000091"></span> Direction / Département</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#fff;border-color:#ce0500;border-width:2px"></span> Cabinet</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#f0f0ff;border-color:#6a6af4"></span> Pôle</span>
    <span class="legend-item"><span class="legend-swatch" style="background:#ff6f00"></span> Intérim</span>
  </div>
</div>

<div class="tree-container">
  <div class="tree-scroll">
    <div id="orgTree" class="org-tree"></div>
  </div>
</div>

<div id="overlay" class="overlay"></div>
<div id="detailPanel" class="detail-panel">
  <button class="close-btn" id="closePanel">&times;</button>
  <div id="panelContent"></div>
</div>

<script>
let allRecords = [];

grist.ready({ requiredAccess: 'full' });

grist.onRecords(function(records) {
  // Also fetch via docApi for reliability
  loadData();
});

async function loadData() {
  try {
    const data = await grist.docApi.fetchTable('Organigramme');
    const ids = data.id;
    allRecords = ids.map((id, i) => ({
      id,
      Nom: data.Nom[i] || '',
      Titre: data.Titre[i] || '',
      Unite: data.Unite[i] || '',
      Niveau: data.Niveau[i] || '',
      Parent_Id: data.Parent_Id[i] || 0,
      Description: data.Description[i] || '',
      Interim: data.Interim[i] || false,
    }));
    renderTree();
  } catch(e) {
    document.getElementById('orgTree').innerHTML = '<p style="padding:20px;color:#ce0500;">Erreur de chargement : ' + e.message + '</p>';
  }
}

function buildTree(parentId) {
  const children = allRecords.filter(r => r.Parent_Id === parentId);
  if (!children.length) return '';

  const lis = children.map(c => {
    const childHtml = buildTree(c.id);
    const niveau = (c.Niveau || '').toLowerCase().replace('é','e');
    const classes = ['card', niveau];
    if (c.Interim) classes.push('interim');

    return `<li>
      <div class="${classes.join(' ')}" data-id="${c.id}">
        <div class="card-unite">${esc(c.Unite)}</div>
        ${c.Nom ? `<div class="card-name">${esc(c.Nom)}</div>` : ''}
        ${c.Titre ? `<div class="card-title">${esc(c.Titre)}</div>` : ''}
      </div>
      ${childHtml ? `<ul class="has-children">${childHtml}</ul>` : ''}
    </li>`;
  }).join('');

  return lis;
}

function renderTree(filter) {
  const root = allRecords.find(r => r.Parent_Id === 0);
  if (!root) { document.getElementById('orgTree').innerHTML = '<p>Aucune donnée.</p>'; return; }

  const niveau = (root.Niveau || '').toLowerCase().replace('é','e');
  const classes = ['card', niveau];

  const childrenHtml = buildTree(root.id);

  document.getElementById('orgTree').innerHTML = `
    <ul>
      <li>
        <div class="${classes.join(' ')}" data-id="${root.id}">
          <div class="card-unite">${esc(root.Unite)}</div>
          <div class="card-name">${esc(root.Nom)}</div>
          <div class="card-title">${esc(root.Titre)}</div>
        </div>
        ${childrenHtml ? `<ul class="has-children">${childrenHtml}</ul>` : ''}
      </li>
    </ul>`;

  // Attach click events
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openDetail(parseInt(card.dataset.id)));
  });

  // Apply search highlight
  if (filter) highlightSearch(filter);
}

function openDetail(id) {
  const r = allRecords.find(x => x.id === id);
  if (!r) return;

  const parent = allRecords.find(x => x.id === r.Parent_Id);
  const children = allRecords.filter(x => x.Parent_Id === id);

  let html = `<h2>${esc(r.Nom) || '—'}</h2>
    <div class="dp-unite">${esc(r.Unite)}</div>`;

  const fields = [
    ['Titre', r.Titre],
    ['Niveau', r.Niveau],
    ['Rattachement', parent ? parent.Unite : '—'],
    ['Description', r.Description],
    ['Intérim', r.Interim ? 'Oui' : 'Non'],
  ];

  fields.forEach(([label, val]) => {
    if (val) html += `<div class="dp-field"><div class="dp-label">${label}</div><div class="dp-value">${esc(val)}</div></div>`;
  });

  if (children.length) {
    html += `<div class="dp-field"><div class="dp-label">Unités rattachées (${children.length})</div>`;
    children.forEach(c => {
      html += `<div class="dp-value" style="margin-bottom:4px;cursor:pointer;color:#000091;text-decoration:underline;" onclick="openDetail(${c.id})">
        ${esc(c.Unite)}${c.Nom ? ' — ' + esc(c.Nom) : ''}</div>`;
    });
    html += '</div>';
  }

  document.getElementById('panelContent').innerHTML = html;
  document.getElementById('detailPanel').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

document.getElementById('closePanel').onclick =
document.getElementById('overlay').onclick = () => {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
};

document.getElementById('search').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  renderTree(q);
});

function highlightSearch(q) {
  if (!q) return;
  document.querySelectorAll('.card').forEach(card => {
    const text = card.textContent.toLowerCase();
    if (text.includes(q)) {
      card.classList.add('highlight');
    }
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

loadData();
</script>
</body>
</html>
