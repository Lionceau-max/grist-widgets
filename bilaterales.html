<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bilatérales RIE</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue:#2563eb; --blue-lt:#eff6ff;
    --red:#ef4444;  --red-lt:#fef2f2;
    --green:#22c55e; --green-lt:#f0fdf4;
    --amber:#f59e0b; --amber-lt:#fffbeb;
    --purple:#8b5cf6; --purple-lt:#f5f3ff;
    --gray:#6b7280; --gray-lt:#f9fafb;
    --border:#e5e7eb; --text:#111827; --text-sm:#374151; --text-xs:#6b7280;
    --radius:8px;
    --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
    --shadow-lg:0 10px 25px rgba(0,0,0,.12);
  }
  body { font-family:system-ui,-apple-system,sans-serif; font-size:14px; color:var(--text); background:#f3f4f6; height:100vh; overflow:hidden; }
  #app { display:flex; height:100vh; overflow:hidden; }

  /* Sidebar */
  #sidebar { width:240px; min-width:200px; background:#fff; border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  #sidebar-header { padding:16px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  #sidebar-header h2 { font-size:13px; font-weight:700; color:var(--text-xs); text-transform:uppercase; letter-spacing:.05em; }
  #btn-new-bilat { width:28px; height:28px; border-radius:6px; border:none; background:var(--blue); color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  #btn-new-bilat:hover { background:#1d4ed8; }
  #sidebar-search-wrap { padding:8px 10px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:6px; }
  #sidebar-search { flex:1; padding:5px 10px; border:1px solid var(--border); border-radius:6px; font-size:12px; outline:none; }
  #sidebar-search:focus { border-color:var(--blue); }
  #sidebar-sort { padding:4px 8px; border-radius:6px; border:1px solid var(--border); background:#fff; font-size:11px; cursor:pointer; color:var(--text-sm); white-space:nowrap; }
  #sidebar-sort:hover { background:var(--gray-lt); }
  #bilat-list { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:4px; }
  .bilat-group-label { font-size:11px; font-weight:700; color:var(--text-xs); text-transform:uppercase; letter-spacing:.05em; padding:8px 4px 4px; }
  .bi-urgency { display:flex; gap:3px; margin-top:3px; }
  .bi-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .bi-dot-bl { background:var(--red); }
  .bi-dot-ar { background:var(--purple); }
  .bi-dot-sv { background:var(--amber); }
  .bi-dot-ec { background:var(--blue); }
  .bilat-item { padding:10px 12px; border-radius:var(--radius); cursor:pointer; border:2px solid transparent; transition:all .15s; }
  .bilat-item:hover { background:var(--gray-lt); }
  .bilat-item.active { background:var(--blue-lt); border-color:var(--blue); }
  .bilat-item .bi-name { font-weight:600; font-size:13px; color:var(--text); }
  .bilat-item .bi-date { font-size:11px; color:var(--text-xs); margin-top:2px; }
  .bilat-item .bi-next { font-size:11px; color:var(--blue); margin-top:2px; }

  /* Main */
  #main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #topbar { background:#fff; border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  #topbar-info { flex:1; min-width:160px; }
  #topbar-title { font-size:16px; font-weight:700; }
  #topbar-subtitle { font-size:12px; color:var(--text-xs); margin-top:2px; }
  #prochain-wrap { display:inline-flex; align-items:center; gap:4px; }
  .edit-icon { cursor:pointer; opacity:.5; font-size:11px; transition:opacity .15s; }
  .edit-icon:hover { opacity:1; }
  #prochain-input { font-size:12px; border:1px solid var(--blue); border-radius:4px; padding:1px 6px; outline:none; color:var(--text); background:#fff; }
  #kpi-bar { display:flex; gap:6px; flex-wrap:wrap; }
  .kpi { padding:4px 11px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; border:2px solid transparent; transition:all .15s; white-space:nowrap; }
  .kpi.all { background:#f3f4f6; color:var(--text-sm); border-color:#e5e7eb; } .kpi.all.active { background:var(--text); color:#fff; border-color:var(--text); }
  .kpi.ec { background:var(--blue-lt); color:var(--blue); }   .kpi.ec.active { background:var(--blue); color:#fff; }
  .kpi.bl { background:var(--red-lt); color:var(--red); }     .kpi.bl.active { background:var(--red); color:#fff; }
  .kpi.ar { background:var(--purple-lt); color:var(--purple); } .kpi.ar.active { background:var(--purple); color:#fff; }
  .kpi.sv { background:var(--amber-lt); color:var(--amber); } .kpi.sv.active { background:var(--amber); color:#fff; }
  .kpi.rs { background:var(--green-lt); color:var(--green); } .kpi.rs.active { background:var(--green); color:#fff; }
  #btn-reconduire { padding:6px 13px; border-radius:6px; background:#fff; color:var(--text-sm); border:1px solid var(--border); font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; flex-shrink:0; }
  #btn-reconduire:hover { background:var(--gray-lt); }
  #btn-edit-bilat { padding:6px 10px; border-radius:6px; background:#fff; border:1px solid var(--border); font-size:14px; cursor:pointer; flex-shrink:0; }
  #btn-edit-bilat:hover { background:var(--gray-lt); }
  #btn-dashboard { padding:6px 10px; border-radius:6px; background:#fff; border:1px solid var(--border); font-size:14px; cursor:pointer; flex-shrink:0; }
  #btn-dashboard:hover { background:var(--gray-lt); }

  #toolbar { background:#fff; border-bottom:1px solid var(--border); padding:8px 20px; display:flex; align-items:center; gap:10px; }
  #btn-new-point { padding:6px 14px; border-radius:6px; background:var(--blue); color:#fff; border:none; font-size:13px; font-weight:600; cursor:pointer; }
  #btn-new-point:hover { background:#1d4ed8; }
  #btn-export { padding:6px 14px; border-radius:6px; background:#fff; color:var(--text-sm); border:1px solid var(--border); font-size:13px; cursor:pointer; }
  #btn-export:hover { background:var(--gray-lt); }
  #btn-gen-cr { padding:6px 14px; border-radius:6px; background:#fff; color:var(--text-sm); border:1px solid var(--border); font-size:13px; cursor:pointer; }
  #btn-gen-cr:hover { background:var(--gray-lt); }
  #btn-gen-cr:disabled { opacity:.5; cursor:default; }
  #btn-view-mode { padding:6px 14px; border-radius:6px; background:#fff; color:var(--text-sm); border:1px solid var(--border); font-size:13px; cursor:pointer; }
  #btn-view-mode:hover { background:var(--gray-lt); }
  #actor-status-filter { padding:6px 10px; border:1px solid var(--border); border-radius:6px; background:#fff; font-size:13px; color:var(--text-sm); }
  #search-box { flex:1; max-width:280px; padding:6px 12px; border:1px solid var(--border); border-radius:6px; font-size:13px; outline:none; }
  #search-box:focus { border-color:var(--blue); }

  /* Cards */
  #content { flex:1; overflow-y:auto; padding:16px 20px; display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:12px; align-content:start; }
  #empty-state { grid-column:1/-1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px; color:var(--text-xs); gap:8px; }
  #empty-state .icon { font-size:36px; }
  #no-bilat { flex:1; display:flex; align-items:center; justify-content:center; color:var(--text-xs); font-size:15px; }

  .point-card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); border-left:4px solid var(--border); cursor:pointer; transition:all .15s; padding:14px 16px; display:flex; flex-direction:column; gap:8px; }
  .point-card:hover { box-shadow:0 4px 12px rgba(0,0,0,.1); transform:translateY(-1px); }
  .point-card.active { outline:2px solid var(--blue); }
  .point-card[data-statut="En cours"]       { border-left-color:var(--blue); }
  .point-card[data-statut="Bloqué"]         { border-left-color:var(--red); }
  .point-card[data-statut="Résolu"]         { border-left-color:var(--green); }
  .point-card[data-statut="À surveiller"]   { border-left-color:var(--amber); }
  .point-card[data-statut="Action requise"] { border-left-color:var(--purple); }
  .point-card[data-statut="En attente"]     { border-left-color:#c2410c; }

  .card-top { display:flex; align-items:flex-start; gap:8px; }
  .drag-handle {
    width: 24px;
    height: 24px;
    border: 1px dashed var(--border);
    border-radius: 6px;
    background: #fff;
    color: var(--text-xs);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: grab;
    flex-shrink: 0;
    user-select: none;
  }
  .drag-handle:hover { border-color: var(--blue); color: var(--blue); }
  .drag-handle.disabled { opacity: .4; cursor: not-allowed; }
  .point-card.dragging { opacity: .45; }
  .point-card.drop-target { outline: 2px dashed var(--blue); outline-offset: 2px; }
  .card-titre { font-weight:600; font-size:13px; line-height:1.4; flex:1; }
  .card-badges { display:flex; align-items:center; gap:4px; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
  .badge { padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; }
  .badge-ec { background:var(--blue-lt); color:var(--blue); }
  .badge-bl { background:var(--red-lt); color:var(--red); }
  .badge-rs { background:var(--green-lt); color:var(--green); }
  .badge-sv { background:var(--amber-lt); color:var(--amber); }
  .badge-ar { background:var(--purple-lt); color:var(--purple); }
  .badge-att { background:#fff7ed; color:#c2410c; }
  .kpi.att { background:#fff7ed; color:#c2410c; }
  .kpi.att.active { background:#c2410c; color:#fff; }
  .badge-age { background:#f3f4f6; color:var(--text-xs); font-size:10px; padding:2px 6px; border-radius:20px; }
  .badge-age.old { background:#fef3c7; color:#92400e; }

  .card-ref { font-size:11px; color:var(--text-xs); font-family:monospace; background:#f3f4f6; padding:1px 6px; border-radius:4px; }
  .card-desc { font-size:12px; color:var(--text-sm); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-desc.expanded { display:block; -webkit-line-clamp:unset; }
  .card-expand { font-size:11px; color:var(--blue); cursor:pointer; background:none; border:none; padding:0; font-family:inherit; }
  .card-expand:hover { text-decoration:underline; }
  .card-action { font-size:12px; color:var(--blue); }
  .card-action::before { content:'→ '; font-weight:700; }
  .card-meta { display:flex; flex-wrap:wrap; gap:8px; align-items:center; font-size:11px; color:var(--text-xs); }
  .card-actors-inline { font-size:12px; color:var(--text-sm); }
  .card-last-exchange {
    padding: 8px 10px;
    border-radius: 8px;
    background: #f8fafc;
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-sm);
    line-height: 1.45;
  }
  .card-last-exchange strong { display:block; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--text-xs); margin-bottom:3px; }
  .point-card.expanded { grid-column: 1 / -1; cursor: default; }
  .point-card.expanded:hover { transform:none; }
  .card-expanded { display:flex; flex-direction:column; gap:16px; padding-top:4px; }
  .card-section { display:flex; flex-direction:column; gap:8px; }
  .card-section-title { font-size:11px; font-weight:700; color:var(--text-xs); text-transform:uppercase; letter-spacing:.05em; }
  .card-action-main { padding: 12px 14px; border-radius: 10px; background: var(--blue-lt); color: var(--blue); font-size: 14px; font-weight: 600; line-height: 1.5; }
  .card-actors-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; }
  .exchange-timeline { display:flex; flex-wrap:wrap; gap:8px; }
  .exchange-chip { border: 1px solid var(--border); border-radius: 999px; background: #fff; color: var(--text-sm); padding: 7px 10px; font-size: 12px; cursor: pointer; }
  .exchange-chip:hover { border-color: var(--blue); color: var(--blue); }
  .exchange-chip.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  .exchange-detail { border: 1px solid var(--border); border-radius: 10px; background: #fff; padding: 12px 14px; display:flex; flex-direction:column; gap:8px; }
  .exchange-detail-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:8px 12px; font-size:12px; color:var(--text-sm); }
  .exchange-detail-line strong { color:var(--text-xs); text-transform:uppercase; letter-spacing:.04em; font-size:10px; display:block; margin-bottom:2px; }
  .exchange-detail-body { white-space: pre-wrap; font-size: 12px; color: var(--text-sm); line-height: 1.55; }
  .card-secondary details { border: 1px solid var(--border); border-radius: 8px; background: #fff; padding: 10px 12px; }
  .card-secondary summary { cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text-sm); }
  .card-secondary-body { margin-top: 10px; font-size: 12px; color: var(--text-sm); line-height: 1.55; }
  .card-actions-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
  .btn-inline { padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: #fff; color: var(--text-sm); cursor: pointer; font-size: 12px; }
  .btn-inline:hover { background: var(--gray-lt); border-color: var(--blue); color: var(--blue); }
  .exchange-empty { font-size: 12px; color: var(--text-xs); padding: 10px 12px; border: 1px dashed var(--border); border-radius: 8px; background: #fff; }
  .inline-editor { display:flex; flex-direction:column; gap:14px; }
  .inline-editor-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:10px; }
  .inline-editor-actions { display:flex; gap:8px; flex-wrap:wrap; }
  .inline-actors-editor { display:flex; flex-direction:column; gap:10px; }
  .inline-actor-row { border:1px solid var(--border); border-radius:8px; background:#fff; padding:10px; display:flex; flex-direction:column; gap:8px; }
  .inline-actor-top { display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .inline-actor-title { font-size:11px; font-weight:700; color:var(--text-xs); text-transform:uppercase; letter-spacing:.04em; }
  .card-actors { display:flex; flex-direction:column; gap:6px; }
  .card-actor {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--gray-lt);
    padding: 8px 10px;
    font-size: 12px;
    color: var(--text-sm);
    line-height: 1.45;
  }
  .card-actor-head { display:flex; align-items:center; gap:6px; margin-bottom:3px; }
  .actor-badge {
    display:inline-flex;
    align-items:center;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--purple-lt);
    color: var(--purple);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .04em;
  }
  .card-actor-line { color: var(--text-xs); }
  .card-actor-meta { display:flex; flex-wrap:wrap; gap:6px; margin:4px 0; }
  .mail-proof {
    margin-top: 4px;
    padding: 6px 8px;
    border-radius: 6px;
    background: #fff;
    border: 1px dashed var(--border);
    color: var(--text-xs);
    font-size: 11px;
    white-space: pre-wrap;
  }
  .actor-quick-actions { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .actor-quick-btn {
    border: 1px solid var(--border);
    border-radius: 999px;
    background: #fff;
    color: var(--text-sm);
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
  }
  .actor-quick-btn:hover { border-color: var(--blue); color: var(--blue); }
  .actor-group-waiting {
    border-color: #fdba74;
    background: #fff7ed;
    color: #9a3412;
  }
  .sort-hint {
    grid-column: 1 / -1;
    padding: 10px 12px;
    border: 1px solid #bfdbfe;
    border-radius: 8px;
    background: #eff6ff;
    color: #1d4ed8;
    font-size: 12px;
  }
  .card-footer { display:flex; align-items:center; justify-content:flex-end; padding-top:6px; border-top:1px solid var(--border); margin-top:2px; }
  .quick-status { font-size:11px; padding:3px 8px; border-radius:4px; border:1px solid var(--border); background:#fff; color:var(--text-sm); cursor:pointer; outline:none; }
  .quick-status:hover { border-color:var(--blue); }

  /* Panel */
  #overlay { position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:100; opacity:0; pointer-events:none; transition:opacity .2s; }
  #overlay.open { opacity:1; pointer-events:auto; }
  #panel { position:fixed; top:0; right:-520px; width:500px; height:100vh; background:#fff; box-shadow:var(--shadow-lg); z-index:101; display:flex; flex-direction:column; transition:right .25s ease; overflow:hidden; }
  #panel.open { right:0; }
  #panel-header { padding:18px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:12px; }
  #panel-title { font-size:15px; font-weight:700; }
  #panel-close { background:none; border:none; cursor:pointer; font-size:20px; color:var(--text-xs); padding:4px; border-radius:4px; }
  #panel-close:hover { background:var(--gray-lt); }
  #panel-body { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:16px; }
  #panel-footer { padding:14px 20px; border-top:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  #panel-history { background:var(--gray-lt); border-radius:6px; padding:10px 12px; }
  #panel-history-title { font-size:11px; font-weight:700; color:var(--text-xs); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; }
  .history-entry { font-size:12px; padding:4px 0; border-bottom:1px solid var(--border); display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; }
  .history-entry:last-child { border-bottom:none; }
  .history-date { color:var(--text-xs); flex-shrink:0; font-size:11px; }
  .history-current { font-size:10px; color:var(--text-xs); }

  .field-group { display:flex; flex-direction:column; gap:5px; }
  .field-label { font-size:12px; font-weight:600; color:var(--text-xs); text-transform:uppercase; letter-spacing:.04em; }
  .field-input, .field-select, .field-textarea { padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:13px; color:var(--text); font-family:inherit; outline:none; transition:border-color .15s; background:#fff; width:100%; }
  .field-input:focus, .field-select:focus, .field-textarea:focus { border-color:var(--blue); }
  .field-textarea { resize:vertical; min-height:90px; line-height:1.5; }
  .field-input.dirty, .field-select.dirty, .field-textarea.dirty { border-color:var(--amber); background:var(--amber-lt); }
  .actors-editor { display:flex; flex-direction:column; gap:10px; }
  .actor-row {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    background: var(--gray-lt);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .actor-row-top { display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .actor-row-title { font-size:11px; font-weight:700; color:var(--text-xs); text-transform:uppercase; letter-spacing:.04em; }
  .actor-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .btn-add-actor, .btn-remove-actor {
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text-sm);
    cursor: pointer;
    font-size: 12px;
  }
  .btn-add-actor { align-self:flex-start; padding:7px 12px; }
  .btn-add-actor:hover, .btn-remove-actor:hover { background: #fff7ed; border-color: #fdba74; }
  .btn-remove-actor { padding:5px 10px; color:var(--red); border-color:#fecaca; }
  .actors-empty { font-size:12px; color:var(--text-xs); font-style:italic; }
  .drop-zone {
    border: 1px dashed #93c5fd;
    border-radius: 8px;
    background: #eff6ff;
    color: #1d4ed8;
    padding: 10px 12px;
    font-size: 12px;
    text-align: center;
  }
  .drop-zone.dragover { background: #dbeafe; border-color: #2563eb; }
  .field-help { font-size:11px; color:var(--text-xs); }
  .btn-save { padding:8px 20px; border-radius:6px; background:var(--blue); color:#fff; border:none; font-size:13px; font-weight:600; cursor:pointer; }
  .btn-save:hover { background:#1d4ed8; }
  .btn-save:disabled { opacity:.5; cursor:default; }
  .btn-delete { padding:8px 14px; border-radius:6px; background:#fff; color:var(--red); border:1px solid #fca5a5; font-size:13px; cursor:pointer; }
  .btn-delete:hover { background:var(--red-lt); }
  .dirty-indicator { font-size:12px; color:var(--amber); font-weight:500; margin-left:auto; }

  /* Modals */
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; display:none; align-items:center; justify-content:center; }
  .modal-backdrop.open { display:flex; }

<script>
// ── State ──
let bilaterales=[], pointsAll=[], beneficiaires=[], sujets_v2=[];
let selectedBilatId=null, selectedPointId=null;
let filterStatut='all', searchQ='', isDirty=false, isNewPoint=false;
let sidebarSearchQ='', sidebarSort='date'; // 'date' or 'ben'
let dragPointId=null;
let contentViewMode='points';
let actorStatusFilter='';
let expandedPointId=null;
let selectedExchangeIndexByPoint={};
let editingPointId=null;

// ── Helpers ──
const badgeClass = s => ({'En cours':'ec','Bloqué':'bl','Résolu':'rs','À surveiller':'sv','Action requise':'ar','En attente':'att'}[s]||'ec');
function fmtDate(ts) {
  if (!ts) return '—';
  return new Date(ts*1000).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function toTs(s) { return s ? Math.floor(new Date(s).getTime()/1000) : 0; }
function toInputDate(ts) { return ts ? new Date(ts*1000).toISOString().slice(0,10) : ''; }
function refInt(v) { return typeof v==='string' ? parseInt(v)||0 : (v||0); }
function benName(id) { const b=beneficiaires.find(b=>b.id===id); return b?(b.Entite?`${b.Beneficiaire} (${b.Entite})`:b.Beneficiaire):`#${id}`; }
function benShort(id) { const b=beneficiaires.find(b=>b.id===id); return b?(b.Entite||b.Beneficiaire):`#${id}`; }
function safeText(v) {
  return String(v || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function parseActors(raw) {
  if (!raw) return [];
  try {
    const parsed = typeof raw === 'string' ? JSON.parse(raw) : raw;
    if (!Array.isArray(parsed)) return [];
    return parsed
      .map(actor => {
        const nom = String(actor.nom || actor.acteur || '').trim();
        const description = String(
          actor.description ||
          [
            actor.position ? `Position : ${actor.position}` : '',
            actor.action ? `Action : ${actor.action}` : '',
            actor.attente || actor.en_attente_de ? `Attente : ${actor.attente || actor.en_attente_de}` : '',
            actor.statut ? `Statut : ${actor.statut}` : '',
            actor.mail || actor.piece || actor.trace ? `Trace : ${actor.mail || actor.piece || actor.trace}` : '',
          ].filter(Boolean).join('\n')
        ).trim();
        return { nom, description };
      })
      .filter(actor => actor.nom || actor.description);
  } catch (err) {
    console.warn('Acteurs_json invalide', err);
    return [];
  }
}
function stringifyActors(actors) {
  const cleaned = actors
    .map(actor => ({
      nom: String(actor.nom || '').trim(),
      description: String(actor.description || '').trim(),
    }))
    .filter(actor => actor.nom || actor.description);
  return cleaned.length ? JSON.stringify(cleaned) : '';
}
function parseOutlookMailText(text) {
  const raw = String(text || '').replace(/\r/g, '').trim();
  if (!raw) return null;
  const lines = raw.split('\n');
  const data = { type:'mail', date:'', from:'', to:'', cc:'', subject:'', body:'', raw };
  let bodyStart = -1;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    const normalized = line.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    const match = normalized.match(/^(De|From|Envoye|Envoye le|Sent|A|To|Cc|Objet|Subject)\s*:\s*(.+)$/i);
    if (!match) {
      if (bodyStart === -1 && line) bodyStart = i;
      continue;
    }
    const key = match[1].toLowerCase();
    const value = line.slice(line.indexOf(':') + 1).trim();
    if (key === 'de' || key === 'from') data.from = value;
    if (key === 'a' || key === 'to') data.to = value;
    if (key === 'cc') data.cc = value;
    if (key === 'objet' || key === 'subject') data.subject = value;
    if (key === 'envoye' || key === 'envoye le' || key === 'sent') data.date = value;
  }
  if (bodyStart >= 0) {
    data.body = lines.slice(bodyStart).join('\n').trim();
  }
  if (!(data.from || data.to || data.subject || data.body)) return null;
  return data;
}
function parseEchanges(raw) {
  if (!raw) return [];
  try {
    const parsed = typeof raw === 'string' ? JSON.parse(raw) : raw;
    if (!Array.isArray(parsed)) return [];
    return parsed.map(item => ({
      type: String(item.type || 'mail').trim() || 'mail',
      date: String(item.date || '').trim(),
      from: String(item.from || item.de || '').trim(),
      to: String(item.to || item.a || '').trim(),
      cc: String(item.cc || '').trim(),
      subject: String(item.subject || item.objet || '').trim(),
      summary: String(item.summary || item.resume || '').trim(),
      body: String(item.body || item.extrait || '').trim(),
      raw: String(item.raw || item.preuve || '').trim(),
    })).filter(item => item.date || item.from || item.to || item.subject || item.body || item.raw);
  } catch (err) {
    console.warn('Echanges_json invalide', err);
    return [];
  }
}
function stringifyEchanges(items) {
  const cleaned = items.map(item => ({
    type: String(item.type || 'mail').trim() || 'mail',
    date: String(item.date || '').trim(),
    from: String(item.from || '').trim(),
    to: String(item.to || '').trim(),
    cc: String(item.cc || '').trim(),
    subject: String(item.subject || '').trim(),
    summary: String(item.summary || '').trim(),
    body: String(item.body || '').trim(),
    raw: String(item.raw || '').trim(),
  })).filter(item => item.date || item.from || item.to || item.cc || item.subject || item.summary || item.body || item.raw);
  return cleaned.length ? JSON.stringify(cleaned) : '';
}
function parseExchangeDateValue(value) {
  const text = String(value || '').trim().toLowerCase();
  if (!text) return 0;
  const normalized = text.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const months = {
    janvier: 0, fevrier: 1, mars: 2, avril: 3, mai: 4, juin: 5,
    juillet: 6, aout: 7, septembre: 8, octobre: 9, novembre: 10, decembre: 11,
  };
  const frMatch = normalized.match(/(?:lundi|mardi|mercredi|jeudi|vendredi|samedi|dimanche)?\s*(\d{1,2})\s+([a-z]+)\s+(\d{4})(?:\s+(\d{1,2}):(\d{2}))?/i);
  if (frMatch && months[frMatch[2]] !== undefined) {
    return new Date(
      Number(frMatch[3]),
      months[frMatch[2]],
      Number(frMatch[1]),
      Number(frMatch[4] || 0),
      Number(frMatch[5] || 0),
      0,
      0
    ).getTime();
  }
  const numMatch = normalized.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})(?:\s+(\d{1,2}):(\d{2}))?/);
  if (numMatch) {
    return new Date(
      Number(numMatch[3]),
      Number(numMatch[2]) - 1,
      Number(numMatch[1]),
      Number(numMatch[4] || 0),
      Number(numMatch[5] || 0),
      0,
      0
    ).getTime();
  }
  const fallback = Date.parse(value);
  return Number.isFinite(fallback) ? fallback : 0;
}
function actorMailToExchange(actor) {
  const mail = String(actor.description || '').trim();
  if (!mail) return null;
  const parsed = parseOutlookMailText(mail);
  if (parsed) {
    return {
      ...parsed,
      summary: actor.nom ? `Trace ${actor.nom}` : '',
      actor: actor.nom || '',
    };
  }
  return {
    type: 'trace',
    date: '',
    from: actor.nom || '',
    to: '',
    cc: '',
    subject: '',
    summary: actor.nom ? `Trace ${actor.nom}` : 'Trace',
    body: mail.slice(0, 500),
    raw: mail,
    actor: actor.nom || '',
  };
}
function getPointEchanges(point) {
  const structured = parseEchanges(point.Echanges_json || '');
  const items = structured.length ? structured : point.Acteurs.map(actorMailToExchange).filter(Boolean);
  return items.sort((a, b) => parseExchangeDateValue(b.date) - parseExchangeDateValue(a.date));
}
function exchangeLabel(item) {
  if (item.type === 'appel') return 'Appel';
  if (item.type === 'reunion') return 'Reunion';
  if (item.type === 'trace') return 'Trace';
  return 'Mail';
}
function exchangeDateLabel(item) {
  return item.date || 'Sans date';
}
function exchangeShortLine(item) {
  const route = [item.from, item.to].filter(Boolean).join(' -> ');
  return route || item.subject || item.summary || 'Sans detail';
}
function actorListLabel(actors) {
  const names = actors.map(actor => actor.nom).filter(Boolean);
  if (!names.length) return 'Aucun acteur';
  if (names.length <= 2) return names.join(', ');
  return `${names.slice(0, 2).join(', ')} +${names.length - 2}`;
}
function inlineExchangeRowHtml(item = {}, index = 0) {
  return `
    <div class="inline-actor-row inline-exchange-row" data-index="${index}">
      <div class="inline-actor-top">
        <div class="inline-actor-title">Echange ${index + 1}</div>
        <button type="button" class="btn-inline" data-inline-remove-exchange="${index}">Supprimer</button>
      </div>
      <div class="inline-editor-grid">
        <div class="field-group">
          <label class="field-label">Type</label>
          <select class="field-select" data-inline-exchange="type">
            <option value="mail"${(item.type || 'mail') === 'mail' ? ' selected' : ''}>Mail</option>
            <option value="appel"${item.type === 'appel' ? ' selected' : ''}>Appel</option>
            <option value="reunion"${item.type === 'reunion' ? ' selected' : ''}>Reunion</option>
            <option value="trace"${item.type === 'trace' ? ' selected' : ''}>Trace</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Date</label>
          <input class="field-input" data-inline-exchange="date" type="text" value="${safeText(item.date || '')}" placeholder="08/04/2026 09:25">
        </div>
      </div>
      <div class="inline-editor-grid">
        <div class="field-group">
          <label class="field-label">De</label>
          <input class="field-input" data-inline-exchange="from" type="text" value="${safeText(item.from || '')}">
        </div>
        <div class="field-group">
          <label class="field-label">A</label>
          <input class="field-input" data-inline-exchange="to" type="text" value="${safeText(item.to || '')}">
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Cc</label>
        <input class="field-input" data-inline-exchange="cc" type="text" value="${safeText(item.cc || '')}">
      </div>
      <div class="field-group">
        <label class="field-label">Objet</label>
        <input class="field-input" data-inline-exchange="subject" type="text" value="${safeText(item.subject || '')}">
      </div>
      <div class="field-group">
        <label class="field-label">Resume</label>
        <textarea class="field-textarea" data-inline-exchange="summary" style="min-height:60px">${safeText(item.summary || '')}</textarea>
      </div>

function collectInlineEchanges(card) {
  return [...card.querySelectorAll('[data-inline-echanges] .inline-exchange-row')].map(row => {
    const raw = (row.querySelector('[data-inline-exchange="raw"]')?.value || '').trim();
    const parsed = parseOutlookMailText(raw);
    const summary = ((row.querySelector('[data-inline-exchange="summary"]')?.value) || '').trim() || (parsed?.body || '');
    return {
      type: ((row.querySelector('[data-inline-exchange="type"]')?.value) || 'mail').trim(),
      date: ((row.querySelector('[data-inline-exchange="date"]')?.value) || '').trim() || (parsed?.date || ''),
      from: ((row.querySelector('[data-inline-exchange="from"]')?.value) || '').trim() || (parsed?.from || ''),
      to: ((row.querySelector('[data-inline-exchange="to"]')?.value) || '').trim() || (parsed?.to || ''),
      cc: ((row.querySelector('[data-inline-exchange="cc"]')?.value) || '').trim() || (parsed?.cc || ''),
      subject: ((row.querySelector('[data-inline-exchange="subject"]')?.value) || '').trim() || (parsed?.subject || ''),
      summary,
      body: parsed?.body || summary,
      raw,
    };
  }).filter(item => item.date || item.from || item.to || item.cc || item.subject || item.summary || item.body || item.raw);
}
function applyParsedExchangeToRow(row) {
  if (!row) return;
  const rawField = row.querySelector('[data-inline-exchange="raw"]');
  if (!rawField) return;
  const parsed = parseOutlookMailText(rawField.value);
  if (!parsed) return;
  const setIfEmpty = (key, value) => {
    if (!value) return;
    const field = row.querySelector(`[data-inline-exchange="${key}"]`);
    if (field && !field.value.trim()) field.value = value;
  };
  setIfEmpty('date', parsed.date);
  setIfEmpty('from', parsed.from);
  setIfEmpty('to', parsed.to);
  setIfEmpty('cc', parsed.cc);
  setIfEmpty('subject', parsed.subject);
  const summaryField = row.querySelector('[data-inline-exchange="summary"]');
  if (summaryField && !summaryField.value.trim() && parsed.body) {
    summaryField.value = parsed.body;
  }
  rawField.value = '';
}
function bindInlineExchangeRowEvents(scope) {
  scope.querySelectorAll('.inline-exchange-row').forEach(row => {
    const rawField = row.querySelector('[data-inline-exchange="raw"]');
    if (!rawField || rawField.dataset.autoparseBound === '1') return;
    rawField.dataset.autoparseBound = '1';
    rawField.addEventListener('paste', () => {
      setTimeout(() => applyParsedExchangeToRow(row), 0);
    });
    rawField.addEventListener('change', () => applyParsedExchangeToRow(row));
    rawField.addEventListener('blur', () => applyParsedExchangeToRow(row));
  });
}

function orderValue(point) {
  return Number.isFinite(point.Ordre) ? point.Ordre : Number.MAX_SAFE_INTEGER;
}
function sortPointsForDisplay(points) {
  const hasManualOrder = points.some(p => Number.isFinite(p.Ordre));
  return [...points].sort((a,b) => {
    if (hasManualOrder) {
      const diff = orderValue(a) - orderValue(b);
      if (diff !== 0) return diff;
    }
    const statutDiff = STATUT_ORDER.indexOf(a.Statut) - STATUT_ORDER.indexOf(b.Statut);
    if (statutDiff !== 0) return statutDiff;
    return a.id - b.id;
  });
}
function canManualSortCurrentView() {

async function ensurePointSchema() {
  const table = await grist.docApi.fetchTable('Points_bilaterales');
  const actions = [];
  if (table.Acteurs_json === undefined) {
    actions.push(['AddColumn', 'Points_bilaterales', 'Acteurs_json', {type: 'Text', label: 'Acteurs'}]);
  }
  if (table.Echanges_json === undefined) {
    actions.push(['AddColumn', 'Points_bilaterales', 'Echanges_json', {type: 'Text', label: 'Echanges'}]);
  }
  if (table.Ordre === undefined) {
    actions.push(['AddColumn', 'Points_bilaterales', 'Ordre', {type: 'Numeric', label: 'Ordre'}]);
  }
  if (actions.length) await grist.docApi.applyUserActions(actions);
}

async function normalizePointOrder() {
  const actions = [];
  const byBilat = {};
  pointsAll.forEach(p => {
    if (!byBilat[p.Bilaterale]) byBilat[p.Bilaterale] = [];
    byBilat[p.Bilaterale].push(p);
  });
  Object.values(byBilat).forEach(points => {
    const sorted = [...points].sort((a,b) => {
      const statutDiff = STATUT_ORDER.indexOf(a.Statut) - STATUT_ORDER.indexOf(b.Statut);
      if (statutDiff !== 0) return statutDiff;
      return a.id - b.id;
    });
    sorted.forEach((point, index) => {
      if (!Number.isFinite(point.Ordre)) {
        point.Ordre = index + 1;
        actions.push(['UpdateRecord', 'Points_bilaterales', point.id, {Ordre: index + 1}]);
      }
    });
  });
  if (actions.length) await grist.docApi.applyUserActions(actions);
}

// ── Load ──
async function loadData() {
  await ensurePointSchema();
  const [bT,pT,benT,sT] = await Promise.all([
    grist.docApi.fetchTable('Bilaterales'),
    grist.docApi.fetchTable('Points_bilaterales'),
    grist.docApi.fetchTable('Beneficiaires'),
    grist.docApi.fetchTable('Sujets_v2'),
  ]);
  bilaterales = bT.id.map((id,i)=>({
    id, Beneficiaire:refInt(bT.Beneficiaire[i]), Date:bT.Date[i],
    Prochain_point:bT.Prochain_point[i],
    Participants_beneficiaire:bT.Participants_beneficiaire[i],
    Participants_DINUM:bT.Participants_DINUM[i],
  })).sort((a,b)=>b.Date-a.Date);

  pointsAll = pT.id.map((id,i)=>({
    id, Bilaterale:refInt(pT.Bilaterale[i]), Titre:pT.Titre[i],
    Description:pT.Description[i], Reference_site:pT.Reference_site[i],
    Statut:pT.Statut[i], Action_suivante:pT.Action_suivante[i], Sujet_PQP:refInt(pT.Sujet_PQP[i]),
    Acteurs_json:pT.Acteurs_json ? pT.Acteurs_json[i] : '',
    Echanges_json:pT.Echanges_json ? pT.Echanges_json[i] : '',
    Acteurs:parseActors(pT.Acteurs_json ? pT.Acteurs_json[i] : ''),
    Ordre:pT.Ordre && pT.Ordre[i] !== null && pT.Ordre[i] !== '' ? Number(pT.Ordre[i]) : NaN,
  }));

  beneficiaires = benT.id.map((id,i)=>({id,Beneficiaire:benT.Beneficiaire[i],Entite:benT.Entite[i]}));
  sujets_v2 = sT.id.map((id,i)=>({id,Code:sT.Code[i],Objet:sT.Objet[i]}));

  await normalizePointOrder();
  if (pointsAll.some(p => !Number.isFinite(p.Ordre))) {
    const refreshed = await grist.docApi.fetchTable('Points_bilaterales');
    pointsAll = refreshed.id.map((id,i)=>({
      id, Bilaterale:refInt(refreshed.Bilaterale[i]), Titre:refreshed.Titre[i],
      Description:refreshed.Description[i], Reference_site:refreshed.Reference_site[i],
      Statut:refreshed.Statut[i], Action_suivante:refreshed.Action_suivante[i], Sujet_PQP:refInt(refreshed.Sujet_PQP[i]),
      Acteurs_json:refreshed.Acteurs_json ? refreshed.Acteurs_json[i] : '',
      Echanges_json:refreshed.Echanges_json ? refreshed.Echanges_json[i] : '',
      Acteurs:parseActors(refreshed.Acteurs_json ? refreshed.Acteurs_json[i] : ''),
      Ordre:refreshed.Ordre && refreshed.Ordre[i] !== null && refreshed.Ordre[i] !== '' ? Number(refreshed.Ordre[i]) : NaN,
    }));
  }

  populateBenSelect();
  populateSujetSelect();
  renderSidebar();
  // Re-render dashboard if visible
  if (document.getElementById('dashboard').style.display === 'block') renderDashboard();
  document.getElementById('loader').style.display='none';
}

function populateBenSelect() {
  const sel=document.getElementById('nb-ben');
  sel.innerHTML='<option value="">— Choisir —</option>';
  [...beneficiaires].sort((a,b)=>a.Beneficiaire.localeCompare(b.Beneficiaire)).forEach(b=>{
    const o=document.createElement('option');
    o.value=b.id; o.textContent=b.Beneficiaire+(b.Entite?` (${b.Entite})`:'');
    sel.appendChild(o);
  });
}

function populateSujetSelect() {
  const sel=document.getElementById('f-sujet');
  sel.innerHTML='<option value="">— Aucun —</option>';
  sujets_v2.forEach(s=>{
    const o=document.createElement('option');
    o.value=s.id; o.textContent=`${s.Code} — ${s.Objet}`; sel.appendChild(o);
  });
}

// ── Ancienneté ──
function getAnciennete(point) {
  const bilat=bilaterales.find(b=>b.id===point.Bilaterale); if(!bilat) return 1;
  const benId=bilat.Beneficiaire;
  const titreNorm=(point.Titre||'').toLowerCase().trim();
  const siblingIds=bilaterales.filter(b=>b.Beneficiaire===benId).map(b=>b.id);
  return siblingIds.filter(bId=>pointsAll.some(p=>p.Bilaterale===bId&&(p.Titre||'').toLowerCase().trim()===titreNorm)).length;
}

function getHistory(point) {
  const bilat=bilaterales.find(b=>b.id===point.Bilaterale); if(!bilat) return [];
  const benId=bilat.Beneficiaire;
  const titreNorm=(point.Titre||'').toLowerCase().trim();
  return bilaterales.filter(b=>b.Beneficiaire===benId).sort((a,b)=>a.Date-b.Date).reduce((acc,b)=>{
    const p=pointsAll.find(p=>p.Bilaterale===b.id&&(p.Titre||'').toLowerCase().trim()===titreNorm);
    if(p) acc.push({date:b.Date,statut:p.Statut,action:p.Action_suivante,bilatId:b.id});
    return acc;
  },[]);
}

// ── Dashboard ──
function renderDashboard() {
  const dash = document.getElementById('dashboard');
  dash.style.display = 'block';
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('content').style.display = 'none';

  // Group bilaterales by beneficiaire, pick most recent per ben
  const byBen = {};
  bilaterales.forEach(b => {
    if (!byBen[b.Beneficiaire] || b.Date > byBen[b.Beneficiaire].Date) byBen[b.Beneficiaire] = b;
  });

  // Total open points across all
  const totalOpen = pointsAll.filter(p => p.Statut !== 'Résolu').length;
  const totalBloque = pointsAll.filter(p => p.Statut === 'Bloqué').length;
  const totalAction = pointsAll.filter(p => p.Statut === 'Action requise').length;

  dash.innerHTML = `
    <div id="dashboard-title">Vue d'ensemble des bilatérales</div>
    <div id="dashboard-sub">${Object.keys(byBen).length} bénéficiaires · ${totalOpen} points ouverts${totalBloque ? ` · <span style="color:var(--red);font-weight:600">${totalBloque} bloqués</span>` : ''}${totalAction ? ` · <span style="color:var(--purple);font-weight:600">${totalAction} actions requises</span>` : ''}</div>
    <div class="dash-grid" id="dash-grid"></div>
  `;

  const grid = document.getElementById('dash-grid');

  // Sort bens: those with Bloqué first, then Action requise, then by date
  const benIds = Object.keys(byBen).map(Number).sort((a, b) => {
    const pa = pointsAll.filter(p => byBen[a] && p.Bilaterale === byBen[a].id);
    const pb = pointsAll.filter(p => byBen[b] && p.Bilaterale === byBen[b].id);
    const urgA = pa.filter(p=>p.Statut==='Bloqué').length*100 + pa.filter(p=>p.Statut==='Action requise').length*10;
    const urgB = pb.filter(p=>p.Statut==='Bloqué').length*100 + pb.filter(p=>p.Statut==='Action requise').length*10;
    return urgB - urgA;
  });

  benIds.forEach(benId => {
    const lastBilat = byBen[benId];
    // All bilats for this ben (sorted desc)
    const benBilats = bilaterales.filter(b => b.Beneficiaire === benId).sort((a,b) => b.Date - a.Date);
    const pts = pointsAll.filter(p => p.Bilaterale === lastBilat.id);
    const open = pts.filter(p => p.Statut !== 'Résolu');
    const nBloque = pts.filter(p=>p.Statut==='Bloqué').length;
    const nAction = pts.filter(p=>p.Statut==='Action requise').length;
    const nSurv   = pts.filter(p=>p.Statut==='À surveiller').length;
    const nCours  = pts.filter(p=>p.Statut==='En cours').length;

    let cardClass = 'dash-card';
    if (nBloque)      cardClass += ' has-bloque';
    else if (nAction) cardClass += ' has-action';
    else if (nSurv)   cardClass += ' has-surveiller';
    else if (nCours)  cardClass += ' has-encours';
    else              cardClass += ' all-resolu';

    const card = document.createElement('div');
    card.className = cardClass;

    const badges = [
      nBloque ? `<span class="badge badge-bl">${nBloque} bloqué${nBloque>1?'s':''}</span>` : '',
      nAction ? `<span class="badge badge-ar">${nAction} action${nAction>1?'s':''}</span>` : '',
      nSurv   ? `<span class="badge badge-sv">${nSurv} surveiller</span>` : '',
      nCours  ? `<span class="badge badge-ec">${nCours} en cours</span>` : '',
    ].filter(Boolean).join('');

    // Top 3 urgent open points
    const urgent = [...open].sort((a,b) => STATUT_ORDER.indexOf(a.Statut)-STATUT_ORDER.indexOf(b.Statut)).slice(0,3);

    card.innerHTML = `
      <div class="dash-name">${benName(benId)}</div>
      <div class="dash-last">Dernière bilat : ${fmtDate(lastBilat.Date)} · ${benBilats.length} réunion${benBilats.length>1?'s':''} au total</div>
      <div class="dash-stats">${badges || '<span class="badge badge-rs">Tout résolu</span>'}</div>
      <div class="dash-recents">
        ${urgent.length ? urgent.map(p =>
          `<div class="dash-point">
            <span class="badge badge-${badgeClass(p.Statut)}" style="font-size:10px;padding:1px 5px;flex-shrink:0">${p.Statut}</span>
            <span>${p.Titre||'(Sans titre)'}${p.Reference_site?' <span class="card-ref">'+p.Reference_site+'</span>':''}</span>
          </div>`
        ).join('') : '<div class="dash-no-bilat">Aucun point ouvert</div>'}
      </div>
      ${lastBilat.Prochain_point ? `<div class="dash-next">↻ Prochain point : ${fmtDate(lastBilat.Prochain_point)}</div>` : ''}
    `;

    card.addEventListener('click', () => selectBilat(lastBilat.id));
    grid.appendChild(card);
  });
}

// ── Sidebar ──
function urgencyDots(pts) {
  const counts = { bl: pts.filter(p=>p.Statut==='Bloqué').length, ar: pts.filter(p=>p.Statut==='Action requise').length, sv: pts.filter(p=>p.Statut==='À surveiller').length, ec: pts.filter(p=>p.Statut==='En cours').length };
  if (!counts.bl && !counts.ar && !counts.sv && !counts.ec) return '';
  let dots = '';
  for (let i=0;i<Math.min(counts.bl,4);i++) dots += '<span class="bi-dot bi-dot-bl"></span>';
  for (let i=0;i<Math.min(counts.ar,4);i++) dots += '<span class="bi-dot bi-dot-ar"></span>';
  for (let i=0;i<Math.min(counts.sv,3);i++) dots += '<span class="bi-dot bi-dot-sv"></span>';
  for (let i=0;i<Math.min(counts.ec,3);i++) dots += '<span class="bi-dot bi-dot-ec"></span>';
  return `<div class="bi-urgency">${dots}</div>`;
}

function renderSidebar() {
  const list = document.getElementById('bilat-list');
  list.innerHTML = '';

  let items = [...bilaterales];

  // Global search filter
  if (sidebarSearchQ) {
    const q = sidebarSearchQ.toLowerCase();
    items = items.filter(b => {
      if (benShort(b.Beneficiaire).toLowerCase().includes(q)) return true;
      // also search in points of this bilat
      return pointsAll.some(p => p.Bilaterale === b.id &&
        ((p.Titre||'').toLowerCase().includes(q) || (p.Description||'').toLowerCase().includes(q) ||
         (p.Reference_site||'').toLowerCase().includes(q) || (p.Action_suivante||'').toLowerCase().includes(q) ||
         p.Acteurs.some(actor => [actor.nom, actor.description].join(' ').toLowerCase().includes(q))));
    });
  }

  if (sidebarSort === 'date') {
    items.sort((a,b) => b.Date - a.Date);
    items.forEach(b => list.appendChild(makeBilatItem(b)));
  } else {
    // Group by beneficiaire
    const groups = {};
    items.forEach(b => {
      const key = benShort(b.Beneficiaire);
      if (!groups[key]) groups[key] = [];
      groups[key].push(b);
    });
    Object.keys(groups).sort().forEach(key => {
      const label = document.createElement('div');
      label.className = 'bilat-group-label';
      label.textContent = key;
      list.appendChild(label);
      groups[key].sort((a,b) => b.Date - a.Date).forEach(b => list.appendChild(makeBilatItem(b)));
    });
  }
}

function makeBilatItem(b) {
  const pts = pointsAll.filter(p => p.Bilaterale === b.id);
  const nOpen = pts.filter(p => p.Statut !== 'Résolu').length;
  const div = document.createElement('div');
  div.className = 'bilat-item' + (b.id === selectedBilatId ? ' active' : '');
  div.innerHTML = `
    <div class="bi-name">${benShort(b.Beneficiaire)}</div>
    <div class="bi-date">📅 ${fmtDate(b.Date)} · ${nOpen} point${nOpen!==1?'s':''} ouvert${nOpen!==1?'s':''}</div>
    ${b.Prochain_point ? `<div class="bi-next">↻ ${fmtDate(b.Prochain_point)}</div>` : ''}
    ${urgencyDots(pts)}
  `;
  div.addEventListener('click', () => selectBilat(b.id));
  return div;
}

// ── Select bilatérale ──
function selectBilat(id) {
  selectedBilatId=id; filterStatut='all'; searchQ=''; expandedPointId=null; selectedExchangeIndexByPoint={};

function renderKPIs() {
  const pts=pointsAll.filter(p=>p.Bilaterale===selectedBilatId);
  const c={all:pts.length,'En cours':0,'Bloqué':0,'Action requise':0,'En attente':0,'À surveiller':0,'Résolu':0};
  pts.forEach(p=>{if(c[p.Statut]!==undefined)c[p.Statut]++;});
  const bar=document.getElementById('kpi-bar'); bar.innerHTML='';
  [{key:'all',label:'Tous',cls:'all'},{key:'En cours',label:'En cours',cls:'ec'},{key:'Bloqué',label:'Bloqué',cls:'bl'},
   {key:'Action requise',label:'Action requise',cls:'ar'},{key:'En attente',label:'En attente',cls:'att'},{key:'À surveiller',label:'À surveiller',cls:'sv'},{key:'Résolu',label:'Résolu',cls:'rs'}
  ].forEach(({key,label,cls})=>{
    if(c[key]===0&&key!=='all') return;
    const btn=document.createElement('button');
    btn.className=`kpi ${cls}`+(filterStatut===key?' active':'');
    btn.textContent=`${label} ${c[key]}`;
    btn.addEventListener('click',()=>{filterStatut=key;renderKPIs();renderCards();});
    bar.appendChild(btn);
  });
}

function bindActorEditorEvents() {
  const container = document.getElementById('f-acteurs');
  container.querySelectorAll('.actor-input').forEach(input => {
    input.addEventListener('input', markDirty);
    input.addEventListener('change', markDirty);
  });
  container.querySelectorAll('.btn-remove-actor').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.closest('.actor-row').remove();
      refreshActorEditorTitles();
      markDirty();
      renderActorsEditorEmptyState();
    });
  });
  container.querySelectorAll('.actor-drop-zone').forEach(zone => {
    zone.addEventListener('dragover', e => {
      e.preventDefault();
      zone.classList.add('dragover');

async function appendDroppedContentToActorRow(row, dataTransfer) {
  const descriptionField = row.querySelector('[data-key="description"]');
  if (!descriptionField) return;
  const chunks = [];
  if (dataTransfer.files && dataTransfer.files.length) {
    const file = dataTransfer.files[0];
    chunks.push(`[Fichier déposé] ${file.name}${file.size ? ` (${Math.round(file.size/1024)} Ko)` : ''}`);
    if (/^text\//.test(file.type) || /\.(txt|eml|url|md)$/i.test(file.name)) {
      const text = await file.text();
      if (text.trim()) chunks.push(text.trim().slice(0, 4000));
    }
  }
  const plain = dataTransfer.getData('text/plain');
  if (plain && plain.trim()) chunks.push(plain.trim().slice(0, 4000));
  const uri = dataTransfer.getData('text/uri-list');
  if (uri && uri.trim()) chunks.push(uri.trim().slice(0, 2000));
  if (!chunks.length) return;
  descriptionField.value = [descriptionField.value.trim(), chunks.join('\n')].filter(Boolean).join('\n\n');
  markDirty();
}

function renderActorView() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  const points = sortPointsForDisplay(pointsAll.filter(p => p.Bilaterale === selectedBilatId));
  const actorGroups = new Map();
  const query = searchQ.trim().toLowerCase();

  points.forEach(point => {
    if (filterStatut !== 'all' && point.Statut !== filterStatut) return;
    point.Acteurs.forEach(actor => {
      const haystack = [point.Titre, point.Description, point.Reference_site, point.Action_suivante, actor.nom, actor.description].join(' ').toLowerCase();
      if (query && !haystack.includes(query)) return;
      const key = actor.nom || 'Sans acteur';
      if (!actorGroups.has(key)) actorGroups.set(key, []);
      actorGroups.get(key).push({ point, actor });
    });
  });

  if (!actorGroups.size) {
    content.innerHTML = '<div id="empty-state"><div class="icon">📭</div><div>Aucun acteur trouvé</div></div>';
    return;
  }

  [...actorGroups.entries()].sort((a, b) => a[0].localeCompare(b[0], 'fr')).forEach(([actorName, entries]) => {
    entries.sort((a, b) => orderValue(a.point) - orderValue(b.point));

    const groupHeader = document.createElement('div');
    groupHeader.className = 'sort-hint';
    groupHeader.textContent = `${actorName} · ${entries.length} point(s)`;
    content.appendChild(groupHeader);

    entries.forEach(({ point, actor }) => {
      const card = document.createElement('div');
      card.className = 'point-card';
      card.dataset.statut = point.Statut || '';
      card.innerHTML = `
        <div class="card-top">
          <div class="card-titre">${safeText(point.Titre || '(Sans titre)')}</div>
          <div class="card-badges">
            <span class="badge badge-${badgeClass(point.Statut)}">${safeText(point.Statut || '—')}</span>
          </div>
        </div>
        ${point.Reference_site ? `<div><span class="card-ref">${safeText(point.Reference_site)}</span></div>` : ''}
        ${point.Description ? `<div class="card-desc expanded">${safeText(point.Description)}</div>` : ''}
        ${renderActorSummary(actor)}
        ${point.Action_suivante ? `<div class="card-action">${safeText(point.Action_suivante)}</div>` : ''}
      `;
      card.addEventListener('click', () => {
        expandedPointId = point.id;
        contentViewMode = 'points';
        document.getElementById('btn-view-mode').textContent = 'Vue acteur';
        document.getElementById('actor-status-filter').style.display = 'none';
        renderCards();
      });
      content.appendChild(card);

function renderCards() {
  if (contentViewMode === 'actors') {
    renderActorView();
    return;
  }
  const content=document.getElementById('content');
  content.innerHTML='';
  let pts=pointsAll.filter(p=>p.Bilaterale===selectedBilatId);
  if(filterStatut!=='all') pts=pts.filter(p=>p.Statut===filterStatut);
  if(searchQ){
    const q=searchQ.toLowerCase();
    pts=pts.filter(p=>(p.Titre||'').toLowerCase().includes(q)||(p.Description||'').toLowerCase().includes(q)||(p.Reference_site||'').toLowerCase().includes(q)||(p.Action_suivante||'').toLowerCase().includes(q)||p.Acteurs.some(actor=>[actor.nom, actor.description].join(' ').toLowerCase().includes(q)));
  }
  if(!pts.length){content.innerHTML='<div id="empty-state"><div class="icon">📭</div><div>Aucun point trouvé</div></div>';return;}
  pts=sortPointsForDisplay(pts);
  const manualSortEnabled = canManualSortCurrentView();
  if (!manualSortEnabled) {
    const hint = document.createElement('div');
    hint.className = 'sort-hint';
    hint.textContent = 'Le glissé-déposé est disponible sans filtre ni recherche active.';
    content.appendChild(hint);
  }

  pts.forEach(p=>{
    const age=getAnciennete(p);
  const ageBadge=age>=2?`<span class="badge-age${age>=3?' old':''}" title="${age} bilatérales">⏱ ${age} réunions</span>`:'';
    const card=document.createElement('div');
    card.className='point-card'+(p.id===selectedPointId?' active':'');
    card.dataset.statut=p.Statut||'';
    card.dataset.id = p.id;
    card.draggable = manualSortEnabled;
    const actorsHtml = p.Acteurs.length ? `<div class="card-actors">${p.Acteurs.map(renderActorSummary).join('')}</div>` : '';
    card.innerHTML=`
      <div class="card-top">
        <div class="drag-handle${manualSortEnabled ? '' : ' disabled'}" title="${manualSortEnabled ? 'Glisser pour réordonner' : 'Désactivé avec filtre/recherche'}">⋮⋮</div>
        <div class="card-titre">${p.Titre||'(Sans titre)'}</div>
        <div class="card-badges">${ageBadge}<span class="badge badge-${badgeClass(p.Statut)}">${p.Statut||'—'}</span></div>
      </div>
      ${p.Reference_site?`<div><span class="card-ref">${p.Reference_site}</span></div>`:''}
      ${p.Description?`<div class="card-desc" id="desc-${p.id}">${p.Description}</div><button class="card-expand" data-target="desc-${p.id}">Voir plus</button>`:''}
      ${p.Action_suivante?`<div class="card-action">${p.Action_suivante}</div>`:''}
      ${actorsHtml}
      <div class="card-footer">
        <select class="quick-status" data-id="${p.id}">
          ${STATUTS.map(s=>`<option${s===p.Statut?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
    `;
    card.addEventListener('click',e=>{if(e.target.classList.contains('quick-status'))return;openPanel(p.id);});

    // Expand/collapse description
    const expandBtn = card.querySelector('.card-expand');
    if (expandBtn) {
      const descEl = card.querySelector('.card-desc');
      // Hide button if content isn't actually clamped (short description)
      requestAnimationFrame(() => {
        if (descEl.scrollHeight <= descEl.clientHeight + 2) expandBtn.style.display = 'none';
      });
      expandBtn.addEventListener('click', e => {
        e.stopPropagation();
        const expanded = descEl.classList.toggle('expanded');
        expandBtn.textContent = expanded ? 'Voir moins' : 'Voir plus';
      });
    }
    card.querySelector('.quick-status').addEventListener('change',async function(e){
      e.stopPropagation();
      const newStatut=this.value; this.disabled=true;
      try{
        await grist.docApi.applyUserActions([['UpdateRecord','Points_bilaterales',p.id,{Statut:newStatut}]]);
        await loadData(); selectBilat(selectedBilatId);
      }catch(err){alert('Erreur : '+err.message);this.disabled=false;}
    });
    if (manualSortEnabled) {
      card.addEventListener('dragstart', e => {
        dragPointId = p.id;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(p.id));
      });
      card.addEventListener('dragend', () => {
        dragPointId = null;
        card.classList.remove('dragging');
        document.querySelectorAll('.point-card.drop-target').forEach(el => el.classList.remove('drop-target'));
      });
      card.addEventListener('dragover', e => {
        e.preventDefault();
        if (dragPointId && dragPointId !== p.id) card.classList.add('drop-target');
      });
      card.addEventListener('dragleave', () => card.classList.remove('drop-target'));
      card.addEventListener('drop', async e => {
        e.preventDefault();
        card.classList.remove('drop-target');
        if (!dragPointId || dragPointId === p.id) return;
        await reorderPoints(dragPointId, p.id);
      });
    }
    content.appendChild(card);
  });
}

      });
    });
    card.querySelectorAll('[data-collapse-point]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        expandedPointId = null;
        editingPointId = null;
        renderCards();
      });
    });
    card.querySelectorAll('[data-edit-point]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        editingPointId = p.id;
        renderCards();
      });
    });
    card.querySelectorAll('[data-inline-cancel]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        editingPointId = null;
        renderCards();
      });
    });
    card.querySelectorAll('[data-inline-save]').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        btn.disabled = true;
        btn.textContent = 'Enregistrement...';
        try {
          await saveInlinePoint(p.id, card);
        } catch (err) {
          alert('Erreur : ' + err.message);
          btn.disabled = false;
          btn.textContent = 'Enregistrer';
        }
      });
    });
    card.querySelectorAll('[data-inline-add-actor]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const container = card.querySelector('[data-inline-actors]');
        if (!container) return;
        const empty = container.querySelector('.exchange-empty');
        if (empty) empty.remove();
        const rows = container.querySelectorAll('.inline-actor-row').length;
        const wrapper = document.createElement('div');
        wrapper.innerHTML = inlineActorRowHtml({}, rows);
        container.appendChild(wrapper.firstElementChild);
      });
    });
    card.querySelectorAll('[data-inline-remove-actor]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        btn.closest('.inline-actor-row')?.remove();
      });
    });
    card.querySelectorAll('[data-inline-add-exchange]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const container = card.querySelector('[data-inline-echanges]');
        if (!container) return;
        const empty = container.querySelector('.exchange-empty');
        if (empty) empty.remove();
        const rows = container.querySelectorAll('.inline-exchange-row').length;
        const wrapper = document.createElement('div');
        wrapper.innerHTML = inlineExchangeRowHtml({}, rows);
        const newRow = wrapper.firstElementChild;
        container.appendChild(newRow);
        bindInlineExchangeRowEvents(card);
        const rawField = newRow.querySelector('[data-inline-exchange="raw"]');
        if (rawField) rawField.focus();
      });
    });
    card.querySelectorAll('[data-inline-remove-exchange]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        btn.closest('.inline-exchange-row')?.remove();
      });
    });
    bindInlineExchangeRowEvents(card);
    if (manualSortEnabled) {
      card.addEventListener('dragstart', e => {
        dragPointId = p.id;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(p.id));
      });
      card.addEventListener('dragend', () => {
        dragPointId = null;
        card.classList.remove('dragging');
        document.querySelectorAll('.point-card.drop-target').forEach(el => el.classList.remove('drop-target'));
      });
      card.addEventListener('dragover', e => {
        e.preventDefault();
        if (dragPointId && dragPointId !== p.id) card.classList.add('drop-target');
      });
      card.addEventListener('dragleave', () => card.classList.remove('drop-target'));
      card.addEventListener('drop', async e => {
        e.preventDefault();
        card.classList.remove('drop-target');
        if (!dragPointId || dragPointId === p.id) return;
        await reorderPoints(dragPointId, p.id);
      });
    }
    content.appendChild(card);
  });
};

async function reorderPoints(sourceId, targetId) {
  if (!selectedBilatId) return;
  const points = sortPointsForDisplay(pointsAll.filter(p => p.Bilaterale === selectedBilatId));
  const sourceIndex = points.findIndex(p => p.id === sourceId);
  const targetIndex = points.findIndex(p => p.id === targetId);
  if (sourceIndex === -1 || targetIndex === -1) return;
  const reordered = [...points];
  const [moved] = reordered.splice(sourceIndex, 1);
  reordered.splice(targetIndex, 0, moved);
  const actions = reordered.map((point, index) => ['UpdateRecord', 'Points_bilaterales', point.id, {Ordre: index + 1}]);
  await grist.docApi.applyUserActions(actions);
  await loadData();
  selectBilat(selectedBilatId);
}

async function savePoint() {
  const actors = collectActorsFromEditor();
  const currentBilatPoints = pointsAll.filter(p => p.Bilaterale === selectedBilatId);
  const nextOrdre = currentBilatPoints.length ? Math.max(...currentBilatPoints.map(p => Number.isFinite(p.Ordre) ? p.Ordre : 0)) + 1 : 1;
  const fields={Titre:document.getElementById('f-titre').value.trim(),Reference_site:document.getElementById('f-ref').value.trim(),
    Statut:document.getElementById('f-statut').value,Description:document.getElementById('f-desc').value.trim(),
    Action_suivante:document.getElementById('f-action').value.trim(),Sujet_PQP:parseInt(document.getElementById('f-sujet').value)||0,
    Acteurs_json:stringifyActors(actors)};
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.textContent='Enregistrement…';
  try{
    if(isNewPoint){fields.Bilaterale=selectedBilatId; fields.Ordre = nextOrdre; await grist.docApi.applyUserActions([['AddRecord','Points_bilaterales',null,fields]]);}
    else{await grist.docApi.applyUserActions([['UpdateRecord','Points_bilaterales',selectedPointId,fields]]);}
    clearDirty();
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('panel').classList.remove('open');
    selectedPointId=null;
    await loadData(); if(selectedBilatId) selectBilat(selectedBilatId);
  }catch(e){alert('Erreur : '+e.message);}
  finally{btn.disabled=false;btn.textContent='Enregistrer';}
}

async function deletePoint() {
  if(!selectedPointId||!confirm('Supprimer ce point ?')) return;
  await grist.docApi.applyUserActions([['RemoveRecord','Points_bilaterales',selectedPointId]]);

// ── Export résumé ──
function generateResume() {
  const b=bilaterales.find(b=>b.id===selectedBilatId); if(!b) return;
  const pts=sortPointsForDisplay(pointsAll.filter(p=>p.Bilaterale===selectedBilatId));
  const lines=[
    `BILATÉRALE RIE – ${benName(b.Beneficiaire).toUpperCase()}`,
    `Date : ${fmtDate(b.Date)}`,
    ...(b.Prochain_point?[`Prochain point : ${fmtDate(b.Prochain_point)}`]:[]),
    ...(b.Participants_beneficiaire?[`Participants ${benShort(b.Beneficiaire)} : ${b.Participants_beneficiaire}`]:[]),
    ...(b.Participants_DINUM?[`Participants DINUM/ISO : ${b.Participants_DINUM}`]:[]),
    '','─'.repeat(60),`POINTS ABORDÉS (${pts.length})`,'─'.repeat(60),
  ];
  pts.forEach((p,i)=>{
    const age=getAnciennete(p);
    lines.push('',`${i+1}. ${p.Titre||'(Sans titre)'}${p.Reference_site?` [${p.Reference_site}]`:''}${age>=2?` (depuis ${age} réunions)`:''}`);
    lines.push(`   Statut : ${p.Statut||'—'}`);
    if(p.Description) lines.push(`   ${p.Description.replace(/\n/g,'\n   ')}`);
    if(p.Action_suivante) lines.push(`   → Action : ${p.Action_suivante}`);
    if(p.Acteurs.length){
      lines.push('   Acteurs associés :');
      p.Acteurs.forEach(actor => {
        lines.push(`   - ${actor.nom || 'Acteur'}`);
        if (actor.description) lines.push(`     ${actor.description.replace(/\n/g,'\n     ')}`);
      });
    }
  });
  const actions=pts.filter(p=>p.Statut!=='Résolu'&&p.Action_suivante);
  if(actions.length){
    lines.push('','─'.repeat(60),'ACTIONS À SUIVRE','─'.repeat(60));
    actions.forEach(p=>{
      lines.push(`• [${p.Statut}] ${p.Titre}${p.Reference_site?` [${p.Reference_site}]`:''}`);
      if (p.Action_suivante) lines.push(`  → ${p.Action_suivante}`);
    });
  }
  document.getElementById('export-title').textContent=`Résumé – ${benShort(b.Beneficiaire)} – ${fmtDate(b.Date)}`;
  document.getElementById('export-text').value=lines.join('\n');
  document.getElementById('modal-export').classList.add('open');
}

// ── Génération CR Word ──
async function generateCR() {
  if (!selectedBilatId) return;
  const btn = document.getElementById('btn-gen-cr');
  btn.disabled = true; btn.textContent = '⏳ Génération…';
  try {
    const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
            AlignmentType, BorderStyle, WidthType, ShadingType, VerticalAlign,
            HeadingLevel, LevelFormat, ImageRun } = window.docx;

    const b = bilaterales.find(x => x.id === selectedBilatId);
    const pts = sortPointsForDisplay(pointsAll.filter(p => p.Bilaterale === selectedBilatId));

    const benFull  = benName(b.Beneficiaire);
    const benCourt = benShort(b.Beneficiaire);
    const noBorder = { style: BorderStyle.NIL };
    const peachBorderFn = () => ({ style: BorderStyle.SINGLE, size: 22, space: 0, color: 'FDE9D9' });
    const ap = (runs, opts = {}) => new Paragraph({ children: runs, spacing: { after: 80, line: 276, lineRule: 'auto' }, ...opts });
    const tr = (text, opts = {}) => new TextRun({ text, font: 'Calibri', size: 22, ...opts });

    const blueBanner = (text) => new Paragraph({
      children: [new TextRun({ text, bold: true, color: 'FFFFFF', font: 'Calibri', size: 22 })],
      shading: { type: ShadingType.CLEAR, fill: '0070C0' },
      spacing: { after: 0, before: 160 },
      indent: { left: 10 },
    });

    const children = [];

    // Helper: base64 string -> Uint8Array
    function b64ToBytes(b64) {
      const bin = atob(b64); const bytes = new Uint8Array(bin.length);
      for (let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i); return bytes;
    }

    // Logos row: PM left, title center, DINUM right
    children.push(new Table({
      width: { size: 9026, type: WidthType.DXA },
      columnWidths: [2200, 4626, 2200],
      borders: { top:{style:BorderStyle.NIL}, bottom:{style:BorderStyle.NIL}, left:{style:BorderStyle.NIL}, right:{style:BorderStyle.NIL}, insideH:{style:BorderStyle.NIL}, insideV:{style:BorderStyle.NIL} },
      rows: [new TableRow({ children: [
        // Logo Premier Ministre
        new TableCell({
          width: { size: 2200, type: WidthType.DXA },
          borders: { top:noBorder, bottom:noBorder, left:noBorder, right:noBorder },
          verticalAlign: VerticalAlign.CENTER,
          children: [new Paragraph({ alignment: AlignmentType.LEFT, spacing:{after:0}, children: [
            new ImageRun({ data: b64ToBytes(LOGO_PM_B64), transformation: { width: 164, height: 72 }, type: 'png' }),
          ]})],
        }),
        // Title center
        new TableCell({
          width: { size: 4626, type: WidthType.DXA },
          borders: { top:noBorder, bottom:noBorder, left:noBorder, right:noBorder },
          verticalAlign: VerticalAlign.CENTER,
          children: [
            new Paragraph({ alignment: AlignmentType.CENTER, spacing:{after:0}, children: [new TextRun({ text: 'Bilatérale', bold: true, color: '1F497D', font: 'Calibri', size: 28 })] }),
            new Paragraph({ alignment: AlignmentType.CENTER, spacing:{after:0}, children: [new TextRun({ text: 'DINUM - ISO / ' + benFull, bold: true, color: '1F497D', font: 'Calibri', size: 26 })] }),
            new Paragraph({ alignment: AlignmentType.CENTER, spacing:{after:0}, children: [new TextRun({ text: fmtDate(b.Date), bold: true, color: '1F497D', font: 'Calibri', size: 24 })] }),
          ],
        }),
        // Logo DINUM
        new TableCell({
          width: { size: 2200, type: WidthType.DXA },
          borders: { top:noBorder, bottom:noBorder, left:noBorder, right:noBorder },
          verticalAlign: VerticalAlign.CENTER,
          children: [new Paragraph({ alignment: AlignmentType.RIGHT, spacing:{after:0}, children: [
            new ImageRun({ data: b64ToBytes(LOGO_DINUM_B64), transformation: { width: 80, height: 77 }, type: 'png' }),
          ]})],
        }),
      ]})],
    }));
    children.push(new Paragraph({ spacing: { after: 160 } }));

    // Diffusion interne
    children.push(new Table({
      width: { size: 9026, type: WidthType.DXA },
      columnWidths: [1500, 7526],
      rows: [new TableRow({ children: [
        new TableCell({
          width: { size: 1500, type: WidthType.DXA },
          shading: { type: ShadingType.CLEAR, fill: 'FF6633' },
          margins: { top: 80, bottom: 80, left: 120, right: 120 },
          verticalAlign: VerticalAlign.CENTER,
          borders: { top: noBorder, bottom: noBorder, left: noBorder, right: noBorder },
          children: [
            new Paragraph({ alignment: AlignmentType.CENTER, spacing: { after: 0 }, children: [new TextRun({ text: 'Diffusion', bold: true, color: '000000', font: 'Verdana', size: 22 })] }),
            new Paragraph({ alignment: AlignmentType.CENTER, spacing: { after: 0 }, children: [new TextRun({ text: 'interne', bold: true, color: '000000', font: 'Verdana', size: 22 })] }),
          ],
        }),
        new TableCell({
          width: { size: 7526, type: WidthType.DXA },
          shading: { type: ShadingType.CLEAR, fill: 'FDE9D9' },
          margins: { top: 80, bottom: 80, left: 160, right: 120 },
          verticalAlign: VerticalAlign.CENTER,
          borders: { top: peachBorderFn(), bottom: peachBorderFn(), left: noBorder, right: noBorder },
          children: [new Paragraph({ spacing: { after: 0 }, children: [
            new TextRun({ text: 'Données ou informations ne devant pas être publiques et/ou ', bold: true, font: 'Verdana', size: 16 }),
            new TextRun({ text: "restreintes à la diffusion d'un domaine spécifique", bold: true, font: 'Verdana', size: 16, underline: {} }),
          ]})],
        }),
      ]})],
    }));

    children.push(new Paragraph({ spacing: { after: 160 } }));

    // Participants
    children.push(ap([tr('Participants ' + benCourt, { bold: true })], { spacing: { after: 20 } }));
    children.push(ap([tr(b.Participants_beneficiaire || '—')], { spacing: { after: 160 } }));
    children.push(ap([tr('Participants DINUM/ISO', { bold: true })], { spacing: { after: 20 } }));
    children.push(ap([tr(b.Participants_DINUM || '—')], { spacing: { after: 160 } }));
    children.push(ap([tr('Date : ', { bold: true }), tr(fmtDate(b.Date))], { spacing: { after: 60 } }));
    children.push(ap([tr('Lieu : ', { bold: true })], { spacing: { after: 0 } }));
    children.push(ap([tr('Webconf.numerique', { bold: true })], { spacing: { after: 60 } }));
    if (b.Prochain_point) {
      children.push(ap([tr('Prochain point programmé le ' + fmtDate(b.Prochain_point))], { spacing: { after: 160 } }));
    } else {
      children.push(new Paragraph({ spacing: { after: 160 } }));
    }

    // Enjeux et contexte
    children.push(blueBanner('Enjeux et contexte'));
    children.push(new Paragraph({ spacing: { after: 0 } }));
    children.push(ap([tr('Bilatérale mensuelle ' + benCourt + ' sur le périmètre RIE')], { spacing: { after: 200 } }));

    // Points abordés
    children.push(new Paragraph({
      children: [new TextRun({ text: 'Points abordés', bold: true, color: 'FFFFFF', font: 'Calibri', size: 22 })],
      shading: { type: ShadingType.CLEAR, fill: '0070C0' },
      spacing: { after: 120, before: 0 },
      indent: { left: 10 },
    }));

    // Points
    pts.forEach(p => {
      const titleText = p.Titre + (p.Reference_site ? ' - ' + p.Reference_site : '');
      children.push(new Paragraph({
        numbering: { reference: 'point-list', level: 0 },
        children: [tr(titleText, { bold: true })],
        spacing: { after: 60, before: 120 },
      }));
      if (p.Description) {
        p.Description.split('\n').filter(l => l.trim()).forEach(line => {
          const isBullet = /^[-•*·]\s/.test(line.trim());
          const text = isBullet ? line.trim().replace(/^[-•*·]\s+/, '') : line;
          if (isBullet) {
            children.push(new Paragraph({
              numbering: { reference: 'desc-bullet', level: 0 },
              children: [tr(text)],
              spacing: { after: 30 },
            }));
          } else {
            children.push(new Paragraph({ children: [tr(text)], indent: { left: 720 }, spacing: { after: 40 } }));
          }
        });
      }
      if (p.Action_suivante) {
        children.push(new Paragraph({
          children: [tr('\u2192 Action : ' + p.Action_suivante, { bold: true, color: '002060' })],
          indent: { left: 720 }, spacing: { after: 80 },
        }));
      }
      if (p.Acteurs.length) {
        p.Acteurs.forEach(actor => {
          const actorParts = [actor.nom || 'Acteur'];
          if (actor.description) actorParts.push(actor.description.replace(/\s+/g, ' ').slice(0, 220));
          children.push(new Paragraph({
            children: [tr('• ' + actorParts.join(' | '), { color: '404040' })],
            indent: { left: 1080 }, spacing: { after: 40 },
          }));
        });
      }
    });

    const doc = new Document({
      numbering: { config: [
        { reference: 'point-list', levels: [{ level: 0, format: LevelFormat.BULLET, text: '-', alignment: AlignmentType.LEFT, style: { paragraph: { indent: { left: 720, hanging: 360 } } } }] },
        { reference: 'desc-bullet', levels: [{ level: 0, format: LevelFormat.BULLET, text: '-', alignment: AlignmentType.LEFT, style: { paragraph: { indent: { left: 1080, hanging: 360 } } } }] },
      ] },
      sections: [{ properties: { page: { size: { width: 11906, height: 16838 }, margin: { top: 851, right: 1134, bottom: 851, left: 1134 } } }, children }],
    });

    // Generate DOCX blob then read as ArrayBuffer for JSZip
    const blob0 = await Packer.toBlob(doc);
    const buffer = await blob0.arrayBuffer();

    // Post-process with JSZip to inject watermark header
    const zip = await JSZip.loadAsync(buffer);

    // Standard Word VML text watermark XML
    const watermarkHeaderXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:hdr xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas"
       xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
       xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"
       xmlns:v="urn:schemas-microsoft-com:vml"
       xmlns:o="urn:schemas-microsoft-com:office:office"
       xmlns:w10="urn:schemas-microsoft-com:office:word">
  <w:p>
    <w:pPr><w:spacing w:after="0"/></w:pPr>
    <w:r>
      <w:rPr><w:noProof/></w:rPr>
      <w:pict>
        <v:shape id="WaterMark" style="position:absolute;margin-left:0;margin-top:0;width:468pt;height:211pt;z-index:-251654144;mso-wrap-edited:f;mso-position-horizontal:center;mso-position-horizontal-relative:margin;mso-position-vertical:center;mso-position-vertical-relative:margin" o:allowoverlap="t" filled="t" stroked="f">
          <v:fill color="#C0C0C0" opacity="0.35" type="solid"/>
          <v:textpath style="font-family:Calibri;font-size:1pt;font-weight:bold;v-text-kern:t" string="CONFIDENTIEL" trim="t" o:extrusionok="t"/>
          <v:handles><v:h position="#,bottomRight"/></v:handles>
          <o:lock v:ext="edit" text="t" shapetype="t"/>
        </v:shape>
      </w:pict>
    </w:r>
  </w:p>
</w:hdr>`;

    // Add watermark header file
    zip.file('word/watermarkHeader.xml', watermarkHeaderXml);

    // Update document relationships to include watermark header
    const relsPath = 'word/_rels/document.xml.rels';
    let relsXml = await zip.file(relsPath).async('string');
    if (!relsXml.includes('watermarkHeader')) {
      relsXml = relsXml.replace(
        '</Relationships>',
        '<Relationship Id="rIdWM" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/header" Target="watermarkHeader.xml"/></Relationships>'
      );
      zip.file(relsPath, relsXml);
    }

    // Update document.xml to reference watermark header on all sections
    let docXml = await zip.file('word/document.xml').async('string');
    if (!docXml.includes('rIdWM')) {
      // Add headerReference before </w:sectPr>
      docXml = docXml.replace(
        /<\/w:sectPr>/g,
        '<w:headerReference w:type="default" r:id="rIdWM"/></w:sectPr>'
      );
      zip.file('word/document.xml', docXml);
    }

    // Update [Content_Types].xml to include watermark header
    let ctXml = await zip.file('[Content_Types].xml').async('string');
    if (!ctXml.includes('watermarkHeader')) {
      ctXml = ctXml.replace(
        '</Types>',
        '<Override PartName="/word/watermarkHeader.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.header+xml"/></Types>'
      );
      zip.file('[Content_Types].xml', ctXml);
    }

    // Export final DOCX
    const finalBlob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
    const url = URL.createObjectURL(finalBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'CR_Bilaterale_RIE-ISO-' + benCourt.replace(/[^a-zA-Z0-9]/g, '-') + '-' + fmtDate(b.Date).replace(/\//g, '-') + '.docx';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch(e) { alert('Erreur génération DOCX : ' + e.message); console.error(e); }
  finally { btn.disabled = false; btn.textContent = '📄 CR Word'; }
}

document.getElementById('btn-gen-cr').addEventListener('click', generateCR);

// ── Boot ──
grist.ready({requiredAccess:'full'});
loadData().then(() => renderDashboard());
</script>
